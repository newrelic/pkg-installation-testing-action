---
- name: Converge
  hosts: all
  tasks:
    - name: Installation tests suite
      vars:
        repo_endpoint: "{{ lookup('env', 'REPO_BASE_URL') }}"
        package_version: "{{ lookup('env', 'PACKAGE_VERSION') }}"
        package_name: "{{ lookup('env', 'PACKAGE_NAME') }}"
        gpg_key: "{{ lookup('env', 'GPG_KEY') }}"
        exec_name: "{{ lookup('env', 'EXEC_NAME') }}"
        version_command: "{{ lookup('env', 'VERSION_COMMAND') }}"

      block:
        - name: Repo setup
          include_role:
            name: caos.ansible_roles.nr_repo_setup

        - name: Fix GPG key format for Ubuntu 26.04
          shell: |
            gpg --dearmor < /etc/apt/keyrings/newrelic-infra.gpg > /tmp/newrelic-infra-binary.gpg
            mv /tmp/newrelic-infra-binary.gpg /etc/apt/keyrings/newrelic-infra.gpg
            apt-get update
          when:
            - ansible_distribution == "Ubuntu"
            - ansible_distribution_version == "26.04"

        - name: Install package
          include_role:
            name: caos.ansible_roles.package_install
          vars:
            package: "{{ package_name }}"
            target_version: "{{ package_version }}"
            
        - name: assert version
          include_role:
            name: caos.ansible_roles.assert_version
          vars:
            target_versions:
              - exec: "{{ exec_name }} {{ version_command }}"
                version: "{{ package_version }}"

